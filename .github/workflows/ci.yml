name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install ruff
      run: pip install ruff
    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend
    - name: Lint backend
      run: ruff check backend/
    - name: Lint core layer
      run: ruff check mqtt/core/
    - name: Lint simulator
      run: ruff check mqtt/simulator/
    - name: Lint frontend
      run: npm run lint
      working-directory: frontend
    - name: Check frontend formatting
      run: npm run format:check
      working-directory: frontend
    - name: Build backend and frontend
      run: docker compose build backend frontend
    - name: Start services
      run: docker compose up -d --wait postgres backend frontend
    - name: Verify services are healthy
      run: docker compose ps
    - name: Run migrations
      run: docker compose exec -T backend python manage.py migrate
    - name: Run backend tests with coverage
      run: docker compose exec -T backend pytest --cov
    - name: Build simulator test image
      run: cd mqtt/simulator && docker build -t planty3-simulator-test -f Dockerfile .
    - name: Run core layer tests with coverage
      run: docker run --rm -e PYTHONPATH=/app -v $(pwd)/mqtt/core:/app planty3-simulator-test pytest --cov=core_layer --cov-report=term-missing
    - name: Run simulator tests with coverage
      run: docker run --rm -e PYTHONPATH=/app:/app/core -v $(pwd)/mqtt/core:/app/core -v $(pwd)/mqtt/simulator:/app planty3-simulator-test pytest --cov=plant_simulator --cov-report=term-missing
    - name: Run frontend tests
      run: docker compose exec -T frontend npm test
