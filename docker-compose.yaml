services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  backend:
    build: ./backend
    container_name: django-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mqtt_client:
    build: ./backend
    container_name: django-mqtt-client
    command: python manage.py mqtt_client
    volumes:
      - ./backend:/app
    depends_on:
      mqtt:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - DJANGO_DB_HOST=${DB_HOST}
      - DJANGO_DB_NAME=${DB_NAME}
      - DJANGO_DB_USER=${DB_USER}
      - DJANGO_DB_PASSWORD=${DB_PASSWORD}
    env_file:
      - .env

  simulator:
    build:
      context: ./mqtt
      dockerfile: simulator/Dockerfile
    container_name: planty3-simulator
    environment:
      PLANT_ID: ${SIM_PLANT_ID:-sim_plant_01}
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: 1883
      TELEMETRY_INTERVAL: ${SIM_TELEMETRY_INTERVAL:-10}
      STATUS_HEARTBEAT_INTERVAL: ${SIM_STATUS_INTERVAL:-60}
      MOISTURE_MIN: ${SIM_MOISTURE_MIN:-20.0}
      MOISTURE_MAX: ${SIM_MOISTURE_MAX:-80.0}
      MOISTURE_PATTERN: ${SIM_MOISTURE_PATTERN:-random}
      LOG_LEVEL: ${SIM_LOG_LEVEL:-INFO}
    depends_on:
      mqtt:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: planty3-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://${BACKEND_IP}:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ./uptime-kuma:/app/data
    ports:
      - "3001:3001"

volumes:
  mosquitto_data:

  postgres_data: